services:
  api:
    build:
      dockerfile: ./Docker/api/Dockerfile
    environment:
      NODE_ENV: production
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    networks:
      - monitoring
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      dockerfile: ./Docker/worker/Dockerfile
    # container_name: worker
    mem_limit: 512m
    cpus: 0.5
    environment:
      NODE_ENV: production
    env_file:
      - ./apps/worker/.env
    deploy:
      replicas: 2
    ports:
      - "9100"
    networks:
      - monitoring
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: videotranscoder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/db
    networks:
      - app
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d" # 7 days of data
    networks:
      - monitoring

networks:
  monitoring:
  app:

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  prometheus_data:
